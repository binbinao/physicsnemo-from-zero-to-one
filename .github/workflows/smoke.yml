name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install minimal deps
        run: |
          python -m pip install -U pip
          pip install -r requirements-minimal.txt
      - name: check_env tier 0
        run: python scripts/check_env.py --tier 0
      - name: ch01 PINN short run
        run: python ch01_hello/pinn_spring.py --epochs 50
